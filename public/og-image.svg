<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070C14"/>
      <stop offset="100%" style="stop-color:#0C1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00A1E0"/>
      <stop offset="100%" style="stop-color:#39FF88"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Logo mark -->
  <rect x="80" y="80" width="72" height="72" rx="18" fill="url(#accent)"/>
  <text x="116" y="136" text-anchor="middle" font-family="monospace" font-weight="900" font-size="44" fill="white">A</text>
  <!-- Title -->
  <text x="80" y="260" font-family="system-ui,sans-serif" font-weight="800" font-size="72" fill="white">ApexLearn</text>
  <!-- Tagline with gradient -->
  <text x="80" y="330" font-family="system-ui,sans-serif" font-weight="400" font-size="28" fill="#8A96A8">Master Salesforce Apex — Free, Interactive, No Login</text>
  <!-- Stats -->
  <text x="80" y="440" font-family="monospace" font-size="20" fill="#00A1E0">15 Modules</text>
  <text x="260" y="440" font-family="monospace" font-size="20" fill="#8A96A8">·</text>
  <text x="290" y="440" font-family="monospace" font-size="20" fill="#00A1E0">60+ Lessons</text>
  <text x="510" y="440" font-family="monospace" font-size="20" fill="#8A96A8">·</text>
  <text x="540" y="440" font-family="monospace" font-size="20" fill="#00A1E0">Boss Quizzes</text>
  <text x="770" y="440" font-family="monospace" font-size="20" fill="#8A96A8">·</text>
  <text x="800" y="440" font-family="monospace" font-size="20" fill="#00A1E0">Daily Challenges</text>
  <!-- URL -->
  <text x="80" y="540" font-family="monospace" font-size="22" fill="#4A5568">apexlearn.dev</text>
  <!-- Code decoration -->
  <rect x="720" y="180" width="420" height="280" rx="12" fill="rgba(17,24,39,0.8)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="750" y="225" font-family="monospace" font-size="14" fill="#4A5568">// Apex Example</text>
  <text x="750" y="260" font-family="monospace" font-size="14" fill="#7FDBFF">List</text>
  <text x="798" y="260" font-family="monospace" font-size="14" fill="#8A96A8">&lt;Account&gt; accounts =</text>
  <text x="750" y="290" font-family="monospace" font-size="14" fill="#8A96A8">  [SELECT Id, Name</text>
  <text x="750" y="320" font-family="monospace" font-size="14" fill="#8A96A8">   FROM Account</text>
  <text x="750" y="350" font-family="monospace" font-size="14" fill="#8A96A8">   WHERE Industry =</text>
  <text x="750" y="380" font-family="monospace" font-size="14" fill="#39FF88">   :targetIndustry];</text>
  <text x="750" y="420" font-family="monospace" font-size="14" fill="#7FDBFF">System</text>
  <text x="814" y="420" font-family="monospace" font-size="14" fill="#8A96A8">.debug(accounts.size());</text>
</svg>
